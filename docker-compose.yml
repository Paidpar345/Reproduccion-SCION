name: "SCION Testbed"

services:
  monitor:
    image: monitor:1.0
    container_name: monitor
    hostname: monitor
    privileged: true
    ports:
      - "8080:8080"
    networks:
      transit_net:
        ipv4_address: 10.100.0.100
    volumes:
      - ./captures:/data
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    hostname: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    ports:
      - "9090:9090"
    networks:
      transit_net:
        ipv4_address: 10.100.0.101
    volumes:
      - ./monitor/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    hostname: grafana
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    networks:
      transit_net:
        ipv4_address: 10.100.0.102
    volumes:
      - ./monitor/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitor/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

  endhost-as15:
    container_name: endhost-as15
    image: endhost-as15:1.0
    hostname: endhost-as15
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    networks:
      as_net_15:
        ipv4_address: 10.10.5.200
      transit_net:
        ipv4_address: 10.100.0.115
      cyberflood_net_a:                 # subred A / VLAN 10
        ipv4_address: 192.168.0.10
    depends_on:
      - scion15

  endhost-as35:
    container_name: endhost-as35
    image: endhost-as35:1.0
    hostname: endhost-as35
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    networks:
      as_net_35:
        ipv4_address: 10.30.5.200
      transit_net:
        ipv4_address: 10.100.0.135
      # endhost-as35 va en la SUBRED B / VLAN 20 (cyberflood_net_b). Separar A y B en VLANs
      # distintas (dominios de broadcast distintos) es lo que impide que CyberFlood haga
      # atajo entre su boca cliente y su boca servidor: el unico camino A<->B es
      # as15 -> SIG -> SCION -> as35. (Con una L2 plana, aunque fueran /24 distintos, CF se
      # contestaba a si mismo sin cruzar el SIG.) Ver docs/adr/0001-inyeccion-cyberflood-sig.md.
      cyberflood_net_b:
        ipv4_address: 192.168.1.11
    depends_on:
      - scion35

  # Generador de carga HTTP cliente-solo (Via C): vive en la SUBRED A (192.168.0.50) y
  # mide ancho de banda contra el Caddy de as35 (192.168.1.11, subred B). Como son /24
  # distintos, enruta por su gateway as15 (.0.10) -> SIG -> SCION. Sustituye a CyberFlood,
  # que en closed-loop se contesta a si mismo y NO cruza el SIG. Ver tools/loadgen/README.md.
  loadgen:
    container_name: loadgen
    build: ./tools/loadgen
    cap_add:
      - NET_ADMIN
    networks:
      cyberflood_net_a:                 # subred A / VLAN 10 (opcional, complementa a CyberFlood)
        ipv4_address: 192.168.0.50
    depends_on:
      - endhost-as15

  endhost-as25:
    container_name: endhost-as25
    image: endhost-as25:1.0
    hostname: endhost-as25
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    networks:
      as_net_25:
        ipv4_address: 10.20.5.200
      transit_net:
        ipv4_address: 10.100.0.125
    depends_on:
      - scion25

  endhost-as45:
    container_name: endhost-as45
    image: endhost-as45:1.0
    hostname: endhost-as45
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    networks:
      as_net_45:
        ipv4_address: 10.40.5.200
      transit_net:
        ipv4_address: 10.100.0.145
    depends_on:
      - scion45

