networks:
  as_net_11:
    ipam:
      config:
        - subnet: 10.10.1.0/24
  as_net_12:
    ipam:
      config:
        - subnet: 10.10.2.0/24
  as_net_13:
    ipam:
      config:
        - subnet: 10.10.3.0/24
  as_net_14:
    ipam:
      config:
        - subnet: 10.10.4.0/24
  as_net_15:
    ipam:
      config:
        - subnet: 10.10.5.0/24

  as_net_21:
    ipam:
      config:
        - subnet: 10.20.1.0/24
  as_net_22:
    ipam:
      config:
        - subnet: 10.20.2.0/24
  as_net_23:
    ipam:
      config:
        - subnet: 10.20.3.0/24
  as_net_24:
    ipam:
      config:
        - subnet: 10.20.4.0/24
  as_net_25:
    ipam:
      config:
        - subnet: 10.20.5.0/24

  as_net_31:
    ipam:
      config:
        - subnet: 10.30.1.0/24
  as_net_32:
    ipam:
      config:
        - subnet: 10.30.2.0/24
  as_net_33:
    ipam:
      config:
        - subnet: 10.30.3.0/24
  as_net_34:
    ipam:
      config:
        - subnet: 10.30.4.0/24
  as_net_35:
    ipam:
      config:
        - subnet: 10.30.5.0/24

  as_net_41:
    ipam:
      config:
        - subnet: 10.40.1.0/24
  as_net_42:
    ipam:
      config:
        - subnet: 10.40.2.0/24
  as_net_43:
    ipam:
      config:
        - subnet: 10.40.3.0/24
  as_net_44:
    ipam:
      config:
        - subnet: 10.40.4.0/24
  as_net_45:
    ipam:
      config:
        - subnet: 10.40.5.0/24

  transit_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.0.0/24
  # DOS redes macvlan sobre DOS NICs separadas (ens19 = VLAN 10 / subred A, ens20 = VLAN 20 /
  # subred B), cada una en su propio bridge/VLAN = su propio dominio de broadcast L2; asi
  # CyberFlood (que emula cliente Y servidor) NO puede hacer atajo entre sus puertos: el unico
  # camino A<->B es as15 -> SIG -> SCION -> as35. REQUIERE en Proxmox: ens19 y ens20 del VM
  # SCION en bridges/VLAN distintos, y las bocas (VR) de CyberFlood en esas mismas VLAN.
  # Ver docs/adr/0001-inyeccion-cyberflood-sig.md.
  cyberflood_net_a:                 # ens19 / VLAN 10 — subred A (cliente + as15)
    driver: macvlan
    driver_opts:
      parent: ens19
    ipam:
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.1
  cyberflood_net_b:                 # ens20 / VLAN 20 — subred B (servidor + as35)
    driver: macvlan
    driver_opts:
      parent: ens20
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1

volumes:
  promdata:
  grafanadata:
